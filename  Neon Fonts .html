<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neon Oaks — Design Your Sign</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Parisienne&family=Dancing+Script:wght@400;700&family=Kaushan+Script&family=Great+Vibes&family=Allura&family=Satisfy&family=Pinyon+Script&family=Caveat:wght@400;600&family=Shadows+Into+Light&family=Cookie&family=Mr+Dafoe&family=Yellowtail&family=Pacifico&family=Herr+Von+Muellerhoff&family=Lobster&family=Alex+Brush&family=Tangerine:wght@400;700&family=Marck+Script&family=Italianno&family=Niconne&family=Norican&family=Damion&family=Clicker+Script&family=Petit+Formal+Script&family=Rouge+Script&family=Style+Script&family=Hurricane&family=Moon+Dance&family=Vibur&family=Quicksand:wght@400;600&family=Poiret+One&family=Bebas+Neue&family=Josefin+Sans:wght@400;600&family=Questrial&family=Anton&family=Comfortaa:wght@400;600&family=Oswald:wght@400;600&family=Special+Elite&family=Monoton&family=Fredoka:wght@500;600&family=Bungee&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#0a080c; --panel:#15101a; --line:#271c2e;
    --txt:#f5eff8; --muted:#9c8ca6; --accent:#ff3df0;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    padding:16px 14px 48px;}
  .wrap{max-width:620px;margin:0 auto;}

  .brand{text-align:center;font-family:'Monoton',cursive;font-size:1.8rem;
    margin:2px 0 0;color:#fff;text-shadow:0 0 6px #fff,0 0 16px var(--accent),0 0 34px var(--accent);}
  .sub{text-align:center;color:var(--muted);font-size:.8rem;margin:4px 0 16px;letter-spacing:.4px;}

  /* Preview */
  .stage{position:relative;background:radial-gradient(125% 120% at 50% 28%,#1c1222 0%,#0a070c 72%);
    border:1px solid var(--line);border-radius:18px;min-height:210px;
    display:flex;align-items:center;justify-content:center;padding:38px 20px;
    overflow:hidden;margin-bottom:6px;}
  .signbox{position:relative;display:inline-flex;align-items:center;justify-content:center;padding:18px 30px;}
  .board{position:absolute;inset:0;border-radius:14px;pointer-events:none;}
  .neon,.silhouette{margin:0;text-align:center;line-height:1.16;word-break:break-word;
    font-family:'Sacramento',cursive;font-size:clamp(2.2rem,10vw,4.4rem);}
  .silhouette{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    color:transparent;-webkit-text-stroke:14px rgba(255,255,255,.09);
    paint-order:stroke fill;z-index:0;pointer-events:none;}
  .neon{position:relative;z-index:1;color:#fff;}

  .hint{text-align:center;color:var(--muted);font-size:.72rem;margin:0 0 18px;}

  .step{margin:18px 0 0;}
  .step h2{font-size:.72rem;text-transform:uppercase;letter-spacing:1.6px;color:var(--muted);
    margin:0 0 9px;font-weight:600;}
  .step h2 b{color:var(--accent);font-weight:700;margin-right:6px;}

  input[type=text]{width:100%;padding:15px;font-size:1.1rem;border-radius:12px;
    background:var(--panel);color:var(--txt);border:1px solid var(--line);}
  input[type=text]:focus{outline:none;border-color:var(--accent);}

  /* Font picker */
  .fonts{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-height:260px;
    overflow-y:auto;padding:2px;border:1px solid var(--line);border-radius:14px;background:#0d0a10;}
  .fcard{background:var(--panel);border:1.5px solid transparent;border-radius:11px;
    padding:12px 8px 8px;text-align:center;cursor:pointer;overflow:hidden;}
  .fcard.sel{border-color:var(--accent);background:#1d1322;}
  .fcard .smp{color:#fff;font-size:1.45rem;line-height:1.1;white-space:nowrap;overflow:hidden;
    text-overflow:ellipsis;text-shadow:0 0 6px rgba(255,255,255,.25);}
  .fcard .nm{display:block;color:var(--muted);font-size:.66rem;margin-top:5px;letter-spacing:.4px;}

  /* Colours */
  .colours{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .col{text-align:center;cursor:pointer;}
  .chip{width:100%;height:42px;border-radius:10px;border:2px solid #2a2030;}
  .col.sel .chip{box-shadow:0 0 0 2px var(--bg),0 0 0 4px #fff;}
  .col .cn{display:block;font-size:.62rem;color:var(--muted);margin-top:5px;}

  .toggle{display:inline-flex;background:var(--panel);border:1px solid var(--line);
    border-radius:11px;overflow:hidden;}
  .toggle button{padding:9px 16px;font-size:.8rem;font-weight:600;background:transparent;
    color:var(--muted);border:none;cursor:pointer;}
  .toggle button.on{background:var(--accent);color:#0a070c;}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:10px;}

  .opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .opt{padding:13px 8px;text-align:center;font-size:.85rem;font-weight:600;border-radius:11px;
    background:var(--panel);border:1.5px solid transparent;color:var(--txt);cursor:pointer;}
  .opt.sel{border-color:var(--accent);background:#1d1322;}

  .actions{display:flex;gap:10px;margin-top:26px;}
  .actions button{flex:1;padding:16px;font-size:1rem;font-weight:700;border:none;
    border-radius:13px;cursor:pointer;color:#fff;}
  .wa{background:#25d366;color:#062b14;}
  .save{background:linear-gradient(135deg,#ff3df0,#a23dff);}
  .actions button:active{transform:scale(.98);}

  .foot{text-align:center;color:var(--muted);font-size:.7rem;margin-top:20px;line-height:1.5;}
</style>
</head>
<body>
<div class="wrap">
  <h1 class="brand">Neon Oaks</h1>
  <p class="sub">Design your custom neon sign in 4 steps</p>

  <div class="stage">
    <div class="signbox" id="signbox">
      <div class="board" id="board"></div>
      <p class="silhouette" id="silhouette" style="display:none">Your text</p>
      <p class="neon" id="neon">Your text</p>
    </div>
  </div>
  <p class="hint" id="hint">Tip: try the Lights On / Lights Off switch below</p>

  <div class="step">
    <h2><b>1</b> Your text</h2>
    <input type="text" id="nameInput" value="Your text" placeholder="Type a name or word…" autocomplete="off">
  </div>

  <div class="step">
    <h2><b>2</b> Font</h2>
    <div class="fonts" id="fonts"></div>
  </div>

  <div class="step">
    <h2><b>3</b> Colour</h2>
    <div class="colours" id="colours"></div>
    <div class="row">
      <span class="toggle">
        <button id="onBtn" class="on">Lights On</button>
        <button id="offBtn">Lights Off</button>
      </span>
    </div>
  </div>

  <div class="step">
    <h2><b>4</b> Acrylic backboard</h2>
    <div class="opts" id="boards"></div>
    <div class="row">
      <span class="toggle">
        <button id="clearBtn" class="on">Clear acrylic</button>
        <button id="frostBtn">Frosted</button>
      </span>
    </div>
  </div>

  <div class="actions">
    <button class="wa" id="waBtn">Send on WhatsApp</button>
    <button class="save" id="saveBtn">Save image</button>
  </div>

  <p class="foot">Neon Oaks · custom backlit acrylic &amp; LED neon signs<br>Your selections are sent to us — we reply with a final mockup &amp; price.</p>
</div>

<script>
/* ====== EDIT THIS: your WhatsApp number in international format, no +, no spaces ====== */
const PHONE = "971563046401"; // Neon Oaks WhatsApp
/* =================================================================================== */

const FONTS = [
  // Cursive / script
  ["Amsterdam","Sacramento"],["Amanda","Parisienne"],["Alexa","Dancing Script"],
  ["Austin","Kaushan Script"],["Barcelona","Great Vibes"],["Bayview","Allura"],
  ["Chelsea","Satisfy"],["Florence","Pinyon Script"],["Freehand","Caveat"],
  ["Freespirit","Shadows Into Light"],["LoveNote","Cookie"],["Neonscript","Mr Dafoe"],
  ["Royalty","Yellowtail"],["Rocket","Pacifico"],["Signature","Herr Von Muellerhoff"],
  ["Vintage","Lobster"],["WildScript","Alex Brush"],["Weekender","Tangerine"],
  ["Manhattan","Marck Script"],["Romance","Italianno"],["Coastline","Niconne"],
  ["Bardot","Norican"],["Sunset","Damion"],["Bellisa","Clicker Script"],
  ["Monroe","Petit Formal Script"],["Lipstick","Rouge Script"],["Allure","Style Script"],
  ["Breeze","Hurricane"],["Moonlight","Moon Dance"],["GlowTube","Vibur"],
  // Block / print
  ["Buttercup","Quicksand"],["ClassicType","Poiret One"],["Los Angeles","Bebas Neue"],
  ["Melbourne","Josefin Sans"],["NeoTokyo","Questrial"],["Monaco","Anton"],
  ["SanDiego","Comfortaa"],["Simplicity","Oswald"],["Typewriter","Special Elite"],
  ["Loveneon","Monoton"],["Majorca","Fredoka"],["Marquee","Bungee"],
];

/* Brand colours from the Neon Oaks chart: [name, lit glow, unlit/off colour] */
const COLOURS = [
  ["Warm White","#ffe6ad","#efe2c4"],["Cold White","#ffffff","#e9edf3"],
  ["Light Yellow","#fff07a","#f1e89c"],["Yellow","#ffe21f","#ffe21f"],
  ["Orange","#ff8a1f","#ff8a1f"],["Dark Blue","#2238ff","#2a3ad6"],
  ["Ice Blue","#27e8ff","#6fdce8"],["Green","#2bff7e","#46e07f"],
  ["Light Pink","#ff8fd2","#f0a8d0"],["Hot Pink","#ff1f8c","#ff3f99"],
  ["Red","#ff2030","#ff2030"],["Teal","#8ff7d6","#a8f2dd"],
];

const BOARDS = [["none","No board"],["shape","Cut to shape"],["rect","Rectangle"]];

const state = { fontName:"Amsterdam", family:"Sacramento", colour:COLOURS[1],
  lit:true, board:"none", frosted:false };

const $ = id=>document.getElementById(id);
const neon=$('neon'), sil=$('silhouette'), board=$('board'),
      input=$('nameInput'), signbox=$('signbox');

function lighten(hex,amt){
  const n=parseInt(hex.slice(1),16);
  let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=Math.round(r+(255-r)*amt);g=Math.round(g+(255-g)*amt);b=Math.round(b+(255-b)*amt);
  return `rgb(${r},${g},${b})`;
}
function glowShadow(c){return `0 0 4px #fff,0 0 9px ${c},0 0 18px ${c},0 0 36px ${c},0 0 68px ${c}`;}

function buildFonts(){
  const wrap=$('fonts');
  FONTS.forEach(([name,fam],i)=>{
    const c=document.createElement('div');
    c.className='fcard'+(i===0?' sel':'');
    c.dataset.fam=fam; c.dataset.name=name;
    c.innerHTML=`<div class="smp" style="font-family:'${fam}'">Aa</div><span class="nm">${name}</span>`;
    c.onclick=()=>{ state.family=fam; state.fontName=name;
      document.querySelectorAll('.fcard').forEach(x=>x.classList.remove('sel'));
      c.classList.add('sel'); render(); };
    wrap.appendChild(c);
  });
}
function refreshFontSamples(){
  const t=(input.value.trim()||"Aa").slice(0,10);
  document.querySelectorAll('.fcard .smp').forEach(s=>s.textContent=t);
}
function buildColours(){
  const wrap=$('colours');
  COLOURS.forEach((col,i)=>{
    const d=document.createElement('div');
    d.className='col'+(i===1?' sel':'');
    d.innerHTML=`<div class="chip" style="background:${col[1]}"></div><span class="cn">${col[0]}</span>`;
    d.onclick=()=>{ state.colour=col;
      document.querySelectorAll('.col').forEach(x=>x.classList.remove('sel'));
      d.classList.add('sel'); render(); };
    wrap.appendChild(d);
  });
}
function buildBoards(){
  const wrap=$('boards');
  BOARDS.forEach(([val,label],i)=>{
    const d=document.createElement('div');
    d.className='opt'+(i===0?' sel':''); d.textContent=label;
    d.onclick=()=>{ state.board=val;
      document.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));
      d.classList.add('sel'); render(); };
    wrap.appendChild(d);
  });
}

function render(){
  const t=input.value.trim()||"Your text";
  neon.textContent=t; sil.textContent=t;
  neon.style.fontFamily=sil.style.fontFamily=`'${state.family}', cursive`;

  const [ , on, off ]=state.colour;
  if(state.lit){
    neon.style.color=lighten(on,.55);
    neon.style.textShadow=glowShadow(on);
  }else{
    neon.style.color=off;
    neon.style.textShadow="none";
  }

  // backboard
  const acr = state.frosted ? "rgba(238,242,255,.16)" : "rgba(255,255,255,.07)";
  const edge = state.frosted ? "rgba(255,255,255,.30)" : "rgba(255,255,255,.22)";
  if(state.board==="rect"){
    board.style.display="block";
    board.style.background=acr;
    board.style.boxShadow=`inset 0 0 0 1px ${edge}, 0 6px 22px rgba(0,0,0,.4)`;
    board.style.backdropFilter=state.frosted?"blur(2px)":"none";
    sil.style.display="none";
    signbox.style.padding="22px 34px";
  }else if(state.board==="shape"){
    board.style.display="none";
    sil.style.display="block";
    sil.style.webkitTextStroke=`14px ${acr}`;
    sil.style.filter=`drop-shadow(0 0 1px ${edge})`+(state.frosted?" blur(.4px)":"");
    signbox.style.padding="18px 30px";
  }else{
    board.style.display="none"; sil.style.display="none";
    signbox.style.padding="18px 24px";
  }
}

/* toggles */
$('onBtn').onclick=function(){state.lit=true;this.classList.add('on');$('offBtn').classList.remove('on');render();};
$('offBtn').onclick=function(){state.lit=false;this.classList.add('on');$('onBtn').classList.remove('on');render();};
$('clearBtn').onclick=function(){state.frosted=false;this.classList.add('on');$('frostBtn').classList.remove('on');render();};
$('frostBtn').onclick=function(){state.frosted=true;this.classList.add('on');$('clearBtn').classList.remove('on');render();};

input.addEventListener('input',()=>{ refreshFontSamples(); render(); });

/* ---- Build PNG of the sign (used by Save image + WhatsApp) ---- */
async function buildPNG(){
  const text=input.value.trim()||"Your text";
  const fam=state.family, [ ,on,off]=state.colour;
  const fontSize=200, scale=2, pad=170;
  try{ await document.fonts.load(`${fontSize}px '${fam}'`,text); await document.fonts.ready; }catch(e){}

  const meas=document.createElement('canvas').getContext('2d');
  meas.font=`${fontSize}px '${fam}'`;
  const tw=Math.ceil(meas.measureText(text).width);
  const W=tw+pad*2, H=fontSize*1.9+pad;
  const c=document.createElement('canvas'); c.width=W*scale; c.height=H*scale;
  const ctx=c.getContext('2d'); ctx.scale(scale,scale);

  // dark wall background
  const g=ctx.createRadialGradient(W/2,H*0.4,40,W/2,H/2,W);
  g.addColorStop(0,"#1c1222"); g.addColorStop(1,"#0a070c");
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.font=`${fontSize}px '${fam}'`;
  const cx=W/2, cy=H/2;
  const acrFill=state.frosted?"rgba(238,242,255,0.16)":"rgba(255,255,255,0.07)";
  const acrEdge="rgba(255,255,255,0.22)";

  // backboard
  if(state.board==="rect"){
    const bx=pad*0.55, by=H*0.5-fontSize*0.85, bw=W-bx*2, bh=fontSize*1.7, r=28;
    ctx.beginPath();
    ctx.moveTo(bx+r,by); ctx.arcTo(bx+bw,by,bx+bw,by+bh,r);
    ctx.arcTo(bx+bw,by+bh,bx,by+bh,r); ctx.arcTo(bx,by+bh,bx,by,r);
    ctx.arcTo(bx,by,bx+bw,by,r); ctx.closePath();
    ctx.fillStyle=acrFill; ctx.fill();
    ctx.lineWidth=2; ctx.strokeStyle=acrEdge; ctx.stroke();
  }else if(state.board==="shape"){
    ctx.lineJoin="round"; ctx.lineCap="round";
    ctx.strokeStyle=acrFill; ctx.lineWidth=fontSize*0.34; ctx.strokeText(text,cx,cy);
    ctx.strokeStyle=acrEdge; ctx.lineWidth=fontSize*0.30; ctx.strokeText(text,cx,cy);
  }

  // neon text
  if(state.lit){
    ctx.shadowColor=on;
    [68,44,24,12].forEach(b=>{ctx.shadowBlur=b;ctx.fillStyle=on;ctx.fillText(text,cx,cy);});
    ctx.shadowBlur=8; ctx.fillStyle=lighten(on,.7); ctx.fillText(text,cx,cy);
    ctx.shadowBlur=0; ctx.fillStyle="#fff"; ctx.fillText(text,cx,cy);
  }else{
    ctx.shadowBlur=0; ctx.fillStyle=off; ctx.fillText(text,cx,cy);
  }
  return new Promise(res=>c.toBlob(res,'image/png'));
}

$('saveBtn').onclick=async()=>{
  const blob=await buildPNG();
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`neon-oaks-${(input.value.trim()||'sign').replace(/\s+/g,'-').toLowerCase()}.png`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
};

$('waBtn').onclick=async()=>{
  const t=input.value.trim()||"(no text)";
  const boardName={none:"No board",shape:"Cut to shape",rect:"Rectangle"}[state.board];
  const msg=
`Hi Neon Oaks! I designed a neon sign:
• Text: ${t}
• Font: ${state.fontName}
• Colour: ${state.colour[0]} (${state.lit?"Lights On":"Lights Off"})
• Acrylic: ${boardName}${state.board!=="none"?` (${state.frosted?"Frosted":"Clear"})`:""}

Please send me a final mockup and price.`;
  const url=(PHONE?`https://wa.me/${PHONE}`:`https://wa.me/`)+`?text=${encodeURIComponent(msg)}`;
  // also save the image so the customer can attach it
  try{ const blob=await buildPNG(); const iu=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=iu;
    a.download=`neon-oaks-${t.replace(/\s+/g,'-').toLowerCase()}.png`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(iu),1500);
  }catch(e){}
  window.open(url,'_blank');
};

buildFonts(); buildColours(); buildBoards(); refreshFontSamples(); render();
</script>
</body>
</html>
